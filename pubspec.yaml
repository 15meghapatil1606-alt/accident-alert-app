name: accident_alert_app
description: A Flutter app that detects accidents, gets GPS location, and sends emergency SMS.
publish_to: 'none' # Remove if you want to publish
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Location services
  geolocator: ^14.0.2

  # SMS sending
  flutter_sms: ^3.0.0

  # Sensor data
  sensors_plus: ^5.0.1

  # URL launcher
  url_launcher: ^6.2.10

  # Permission handler
  permission_handler: ^11.0.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true